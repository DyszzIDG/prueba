<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelBloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--bg-light);">
    <header>
        <a href="index.html" class="logo">🌍 TravelBloom</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header" style="background-image: linear-gradient(rgba(11, 28, 59, 0.8), rgba(11, 28, 59, 0.8)), url('https://images.unsplash.com/photo-1423666639041-f56000c27a9a?auto=format&fit=crop&q=80&w=1920&h=600');">
        <h1>Let's Start Your Next Adventure</h1>
    </div>

    <section class="content-section">
        <div class="contact-container">
            <div class="contact-info">
                <h2 style="color: white; text-align: left;">Get In Touch</h2>
                <p style="margin-top: 1rem; margin-bottom: 2rem;">Interested in a tailor-made travel experience? Leave us a message below and one of our experts will contact you directly.</p>
                <p style="margin-bottom: 1rem;">📞 1-800-TRAVEL</p>
                <p style="margin-bottom: 1rem;">📧 info@travelbloom.com</p>
                <p>📍 123 World Avenue, NYC</p>
            </div>
            
            <form onsubmit="event.preventDefault(); alert('Thank you for contacting us! We will reach out shortly.'); this.reset();" style="padding: 1rem;">
                <h2 style="text-align: left; margin-bottom: 1rem;">Send Message</h2>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us about your dream destination..." required></textarea>
                </div>
                <button type="submit" class="btn-search" style="width: 100%;">Submit</button>
            </form>
        </div>
    </section>
</body>
</html>
